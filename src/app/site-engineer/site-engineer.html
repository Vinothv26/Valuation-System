<div class="container-fluid p-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="mb-0">Site Engineer Dashboard</h3>

   <button class="btn btn-danger btn-sm" (click)="logout()">
      Logout
    </button>
  </div>

  <!-- FORM -->
  <div class="card p-4 shadow-sm">
    <h5>
      {{ editIndex === null ? 'Add Site Valuation' : 'Update Site Valuation' }}
    </h5>

    <form (ngSubmit)="saveSite()">

      <div class="mb-3">
        <label>Site Name</label>
        <input class="form-control"
          [(ngModel)]="siteName"
          name="siteName"
          required>
      </div>

      <div class="mb-3">
        <label>Engineer Name</label>
        <input class="form-control"
          [(ngModel)]="engineer"
          name="engineer"
          required>
      </div>

      <div class="mb-3">
        <label>Estimated Value</label>
        <input class="form-control"
          [(ngModel)]="value"
          name="value"
          required>
      </div>

      <button class="btn btn-primary me-2">
        {{ editIndex === null ? 'Save Data' : 'Update Data' }}
      </button>

      <button type="button" class="btn btn-secondary" (click)="resetForm()">
        Clear
      </button>

    </form>
  </div>

  <!-- TABLE -->
  <div class="card mt-4 p-3 shadow-sm">

    <h5>My Entries</h5>

    <table class="table table-striped mt-2">
      <thead>
        <tr>
          <th>Site</th>
          <th>Engineer</th>
          <th>Value</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of sites; let i = index">
          <td>{{ item.siteName }}</td>
          <td>{{ item.engineer }}</td>
          <td>{{ item.value }}</td>

          <td>
            <button class="btn btn-warning btn-sm me-2"
              (click)="editSite(i)">
              Edit
            </button>

            <button class="btn btn-danger btn-sm"
              (click)="deleteSite(i)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>

    </table>
  </div>

</div>
